<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자색 바꾸기</title>
    <style>
        body {text-align:center;}
        #heading {color:blue;}
        #text {color:gray; font-size:15px; }
    </style>
</head>
<body>
    <h1 id="heading">이윤재</h1>
    <p id="text">위 텍스트를 클릭해 보세요</p>

    <script>
        var heading = document.querySelector("#heading") /* js에선 var(재정의 가능),let(재정의X),const(상수)만 쓰임 */
        heading.onclick = function() { /* onclick 이벤트 , 기능*/
            heading.style.color = "green";
        }
    </script>

    <script>
        alert("안녕하세요?") /* 알림 창 출력*/
    </script>

    <script>
        var reply = confirm("정말 배경 이미지를 바꾸겠습니까?") /* 확인 창 출력 */
    </script>
 
    <script>
        var name = prompt("이름을 입력하세요.", "아무개") /* 프롬프트 창에서 입력받기 (두번째 쉼표는 생략가능.) */
    </script>

</body>
</html>
