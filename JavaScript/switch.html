<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch문</title>
    <link rel="stylesheet" href="css/switch.css">
</head>
<body>
    <script>
        var season = prompt("관심 세션을 선택하세요. 12월,1월,2월 -겨울 | 6월,7월 -여름 | 9월,10월 -가을 | 3월, 4월 - 봄"); //변수 선언, 초기화(prompt)
        switch(season) { //문자열만
            case "12":
            case "1":
            case "2": document.write("<p>12월,1월,2월 은  <strong>겨울</strong>입니다."); 
                break;
            case "6" :
            case "7" : document.write("<p>6월,7월 은 <strong>여름</strong>입니다.");
                break;
            case "9" :
            case "10" : document.write("<p>9월,10월 은 <strong>가을</strong>입니다.");
                break;
            case "3" :
            case "4" : 
            case "5" : document.write("<p>3월,4월,5월 은 <strong>봄</strong>입니다.");
                break;    

        }
    </script>

</body>
</html>
